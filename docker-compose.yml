services:
  mysql_db:
    image: mysql:latest
    container_name: mysql_database
    restart: unless-stopped
    env_file: 
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  stock_app:
    build: .
    container_name: stock_app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - mysql_db

volumes:
  mysql_data:
    driver: local